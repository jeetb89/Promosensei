version: "3.9"

services:

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_store:/chroma/chroma   # existing data is preserved
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - CHROMA_SERVER_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  promosensei:
    build: .
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb   # tells vector_store.py to use HttpClient
      - CHROMA_PORT=8000
    depends_on:
      chromadb:
        condition: service_healthy
